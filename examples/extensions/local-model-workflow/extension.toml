name = "local-model-workflow"
version = "0.1.0"
api_version = "0.1"
description = "Inspectable prompt shaping and status for compact local-model sessions"

[entrypoint]
command = "extension.py"

[capabilities]
filesystem = "none"
process = false
network = false

[contributes]
hooks = ["before_prompt"]
ui = ["status"]
context = true
notifications = true
