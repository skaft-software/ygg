<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title description">
  <title id="title">skaft-software/ygg</title>
  <description id="description">A clean white project card for Ygg, a coding agent harness for local and cloud models alike.</description>

  <rect width="1200" height="520" rx="24" fill="#ffffff"/>
  <rect x="1" y="1" width="1198" height="518" rx="23" fill="none" stroke="#e8ebef" stroke-width="2"/>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="80" y="145" fill="#2f353d" font-size="74" font-weight="400" letter-spacing="-2">
      <tspan>skaft-software/</tspan><tspan font-weight="700">ygg</tspan>
    </text>

    <text x="80" y="230" fill="#6f7885" font-size="31" font-weight="400">a coding agent harness for local and cloud models</text>
    <text x="80" y="276" fill="#6f7885" font-size="31" font-weight="400">alike.</text>

    <g transform="translate(920 70)">
