      <rect x="1" y="1" width="198" height="198" rx="27" fill="none" stroke="#f1f2f4" stroke-width="2"/>
      <text x="100" y="119" fill="#12161a" font-size="44" font-weight="700" letter-spacing="5" text-anchor="middle">skaft</text>
    </g>

    <g transform="translate(80 405)" fill="#727c89">
      <g>
        <path d="M4 21c0-7 5-12 12-12s12 5 12 12M16 5a6 6 0 1 1 0 12 6 6 0 0 1 0-12" fill="none" stroke="#8592a8" stroke-width="3" stroke-linecap="round"/>
        <text x="45" y="17" font-size="22" font-weight="600" fill="#343b44">Rust</text>
        <text x="45" y="46" font-size="16">single native binary</text>
      </g>

      <g transform="translate(285 0)">
        <circle cx="16" cy="16" r="14" fill="none" stroke="#8592a8" stroke-width="3"/>
        <circle cx="16" cy="16" r="4" fill="#8592a8"/>
        <text x="48" y="17" font-size="22" font-weight="600" fill="#343b44">Local first</text>
