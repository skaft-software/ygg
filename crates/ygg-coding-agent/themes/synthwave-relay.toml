[metadata]
name = "Synthwave Relay"
description = "A neon radio relay: magenta control signals, cyan data, diamond markers, and energetic compact rhythm."
author = "Ygg theme pack"
version = "1"
terminal = "light-dark"
adaptive = true

[colors]
accent = "#d238b4"
muted = "#6e6680"
error = "#d43d63"
warning = "#a76a13"
success = "#2d8868"
info = "#008eaa"
border = "#775c91"
border_focused = "accent"
tool_title = "#008eaa"
md_heading = "#d238b4"
md_link = "#008eaa"
md_code = "#a256c3"
md_code_border = "#775c91"
md_quote_border = "#d238b4"
md_list_bullet = "#008eaa"
syntax_comment = "#6e6680"
syntax_keyword = "#a256c3"
syntax_function = "#008eaa"
syntax_string = "#2d8868"
syntax_number = "#a76a13"
syntax_type = "#8b58bf"
syntax_operator = "#d238b4"
diff_added_bg = "#2d8868"
diff_removed_bg = "#d43d63"
relay_tx_bg = "#641357"
relay_rx_bg = "#083e50"
relay_aux_bg = "#35224f"
relay_break_bg = "#5b243b"

[model]
use_lab_color = false

[roles.tool_title]
foreground = "tool_title"
bold = true

[roles.heading]
foreground = "md_heading"
bold = true

[roles.link]
foreground = "md_link"
underline = true

[roles.notification]
foreground = "info"
bold = true

[roles.confirmation]
foreground = "warning"
bold = true

[roles."extension.relay"]
foreground = "accent"
italic = true

[roles."extension.status"]
foreground = "info"
bold = true

[roles."extension.header"]
foreground = "accent"
bold = true
italic = true

[roles."surface.user"]
foreground = "foreground"
background = "relay_tx_bg"

[roles."surface.user.border"]
foreground = "accent"
bold = true

[roles."surface.user.label"]
foreground = "accent"
bold = true
italic = true

[roles."surface.assistant"]
foreground = "foreground"
background = "relay_rx_bg"

[roles."surface.assistant.border"]
foreground = "info"
bold = true

[roles."surface.assistant.label"]
foreground = "info"
bold = true
italic = true

[roles."surface.reasoning"]
foreground = "muted"

[roles."surface.reasoning.border"]
foreground = "accent"

[roles."surface.reasoning.label"]
foreground = "accent"
italic = true

[roles."surface.tool"]
foreground = "foreground"
background = "relay_aux_bg"

[roles."surface.tool.border"]
foreground = "info"

[roles."surface.tool.label"]
foreground = "info"
bold = true

[roles."surface.shell"]
foreground = "foreground"
background = "relay_aux_bg"

[roles."surface.shell.border"]
foreground = "accent"

[roles."surface.shell.label"]
foreground = "accent"
bold = true

[roles."surface.notice"]
foreground = "foreground"
background = "relay_break_bg"

[roles."surface.notice.border"]
foreground = "warning"
bold = true

[roles."surface.notice.label"]
foreground = "warning"
bold = true
inverse = true

[roles."surface.outcome"]
foreground = "muted"

[roles."surface.outcome.border"]
foreground = "accent"

[roles."surface.outcome.label"]
foreground = "accent"
bold = true

[roles."surface.compaction"]
foreground = "muted"

[roles."surface.compaction.border"]
foreground = "info"

[roles."surface.compaction.label"]
foreground = "info"
italic = true

[glyphs]
top_left = "╭"
top_right = "╮"
bottom_left = "╰"
bottom_right = "╯"
horizontal = "─"
vertical = "│"
branch = "◆"
last_branch = "◇"
rail = "│"
prompt = "◆"
shell = "⌁"
success = "◇"
warning = "△"
note = "◈"
error = "×"
interrupt = "■"
pending = "◈"
collapsed = "▷"
expanded = "▽"
separator = " ◇ "
ellipsis = "…"
bullet = "◆"
reasoning = "~"
wordmark = "YGG//FM"

[glyphs_ascii]
top_left = "+"
top_right = "\\"
bottom_left = "\\"
bottom_right = "/"
horizontal = "-"
vertical = "|"
branch = "<>"
last_branch = "`>"
rail = "|"
prompt = ">"
shell = "~"
success = "<>"
warning = "/!"
note = "<*>"
error = "xx"
interrupt = "[]"
pending = "<>"
collapsed = ">"
expanded = "v"
separator = " <> "
ellipsis = "..."
bullet = "*"
reasoning = "~"
wordmark = "YGG//FM"

[surfaces.user]
chrome = "card"
heading = "tab"
label = "TX // OPERATOR"
padding = 1
width = "content"
align = "center"
max_width = 86
narrow_chrome = "rail"
narrow_heading = "inline"
narrow_label = "TX"
narrow_padding = 0

[surfaces.assistant]
chrome = "card"
heading = "tab"
label = "RX // YGG"
padding = 1
width = "content"
align = "center"
max_width = 92
narrow_chrome = "rail"
narrow_heading = "inline"
narrow_label = "RX"
narrow_padding = 0

[surfaces.reasoning]
chrome = "rule"
heading = "overline"
label = "CARRIER"
padding = 0
width = "content"
align = "center"
max_width = 72
narrow_chrome = "plain"
narrow_heading = "inline"
narrow_label = "RF"
narrow_padding = 0

[surfaces.tool]
chrome = "band"
heading = "tab"
label = "AUX // TOOL"
padding = 1
width = "content"
align = "center"
max_width = 96
narrow_chrome = "rail"
narrow_heading = "inline"
narrow_label = "AUX"
narrow_padding = 0

[surfaces.shell]
chrome = "band"
heading = "tab"
label = "REMOTE // EXEC"
padding = 1
width = "content"
align = "center"
max_width = 96
narrow_chrome = "rail"
narrow_heading = "inline"
narrow_label = "EXEC"
narrow_padding = 0

[surfaces.notice]
chrome = "card"
heading = "inline"
label = "BREAK"
padding = 1
width = "content"
align = "center"
max_width = 78
narrow_chrome = "plain"
narrow_heading = "inline"
narrow_label = "!"
narrow_padding = 0

[surfaces.outcome]
chrome = "rule"
heading = "overline"
label = "SIGNAL COMPLETE"
padding = 0
width = "content"
align = "center"
max_width = 72
narrow_chrome = "plain"
narrow_heading = "inline"
narrow_label = "END"
narrow_padding = 0

[surfaces.compaction]
chrome = "rule"
heading = "overline"
label = "REPLAY BUFFER"
padding = 0
width = "content"
align = "center"
max_width = 86
narrow_chrome = "plain"
narrow_heading = "inline"
narrow_label = "REPLAY"
narrow_padding = 0

[layout]
density = "compact"
show_header = true
show_footer = true
show_status_line = true
show_tool_duration = true
show_reasoning = true
show_panel_borders = false
transcript_inset = 1
composer_padding = 1
narrow_breakpoint = 70
narrow_show_header = true
narrow_show_footer = true
narrow_show_status_line = true
narrow_show_tool_duration = false
narrow_show_reasoning = false
narrow_show_panel_borders = false
